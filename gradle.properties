# JVM/Gradle defaults for a small Compose Android app.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# AndroidX is required by Jetpack Compose, Activity, Lifecycle, and DataStore.
android.useAndroidX=true

# Kotlin source style.
kotlin.code.style=official

# Smaller generated R classes.
android.nonTransitiveRClass=true
