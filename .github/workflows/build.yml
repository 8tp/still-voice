name: build

on:
  pull_request:
  push:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: build and test
        run: |
          if ./gradlew --no-daemon :app:tasks --all | grep -q "testDebugUnitTest"; then
            ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest --stacktrace
          else
            ./gradlew --no-daemon :app:assembleDebug --stacktrace
          fi

      - name: verify still pact when available
        run: |
          if [ -x ../tools/verify-permissions.sh ]; then
            ../tools/verify-permissions.sh
          else
            echo "workspace verifier not present in this per-repo checkout; skipping"
          fi
